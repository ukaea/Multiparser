name: multiparser
on:
  push:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unit_tests:
    name: Unit Tests (${{ matrix.os }} Python${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.14']
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install UV
        run: python -m pip install uv
      - name: Run Unit Tests
        run: |
          uv sync --all-groups --all-extras --python ${{ matrix.python-version }}
          uv run --python ${{ matrix.python-version }} pytest -p no:warnings \
          -c /dev/null --cov=multiparser -v -o cache_dir=${GITHUB_WORKSPACE}/.pytest-cache
